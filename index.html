<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Men's Premium Outfits</title>
    
    <style>
        /* Reset basic styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        /* Splash Screen Styles */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000; /* Deep black background to blend with video edges */
            z-index: 9999;
            transition: opacity 1s ease-out; /* Smooth fade out */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #intro-video {
            width: 100%;
            height: 100%;
            /* 'contain' ensures the full video shows without zooming or cropping on mobile */
            object-fit: contain; 
        }

        /* Main Content Styles */
        #main-content {
            padding: 40px 20px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #111;
        }

        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            flex-wrap: wrap; /* Allows menu items to wrap nicely on small mobile screens */
            gap: 20px;
            font-weight: bold;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 10px;
        }

        nav ul li {
            cursor: pointer;
            transition: color 0.3s;
        }
        
        nav ul li:hover {
            color: #d4af37; /* A premium gold color on hover */
        }

        main {
            margin-top: 60px;
            padding: 0 15px; /* Added padding for mobile readability */
        }

        main h2 {
            font-size: 2rem;
            margin-bottom: 15px;
            color: #222;
        }

        main p {
            color: #666;
            font-size: 1.1rem;
            line-height: 1.5;
        }

        /* Helper class to hide elements */
        .hidden {
            display: none;
        }

        /* Helper class to fade out the splash screen */
        .fade-out {
            opacity: 0;
            pointer-events: none; /* Prevents clicks on the invisible splash screen */
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <video id="intro-video" autoplay muted playsinline>
            <source src="https://www.dropbox.com/scl/fi/5d4y6cgc7t59y5bz7ql7u/gemini_generated_video_b8d3acef.mp4?rlkey=qz9zoob3x62t85k2h6oibc03e&st=ifv9s3ft&raw=1" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <div id="main-content" class="hidden">
        <header>
            <h1>MEN's OUTFITS</h1>
            <nav>
                <ul>
                    <li>Shop</li>
                    <li>New Arrivals</li>
                    <li>Collections</li>
                    <li>About</li>
                </ul>
            </nav>
        </header>
        <main>
            <h2>Elevate Your Style</h2>
            <p>Our exclusive premium men's collection is ready for you to explore.</p>
        </main>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const splashScreen = document.getElementById('splash-screen');
            const mainContent = document.getElementById('main-content');
            const introVideo = document.getElementById('intro-video');

            // When the video finishes playing, hide splash screen and show content
            introVideo.addEventListener('ended', () => {
                // Add fade-out effect to splash screen
                splashScreen.classList.add('fade-out');
                
                // Show main content
                mainContent.classList.remove('hidden');

                // Remove the splash screen from the DOM after the transition ends (1 second)
                setTimeout(() => {
                    splashScreen.style.display = 'none';
                }, 1000);
            });

            // Fallback: If there is an error loading the video or the connection drops, skip the splash screen
            introVideo.addEventListener('error', () => {
                console.log("Video failed to load. Skipping intro...");
                splashScreen.style.display = 'none';
                mainContent.classList.remove('hidden');
            });
        });
    </script>
</body>
</html>
